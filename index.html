<!doctype html>
<html data-theme="dark">
  <head>
    <title>MyHitster — Mystery Music</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      /* Apply theme before first paint to prevent flash of unstyled content */
      (function () {
        var t = localStorage.getItem('theme');
        if (!t || t === 'dark' || t === 'light') t = 'neon';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>

    <!-- Particle network background -->
    <canvas id="bg-canvas"></canvas>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="top-bar-left">
        <a class="top-bar-logo" href="index.html">
          <div class="logo-mark">H</div>
          <span class="logo-text">MyHitster</span>
        </a>
        <nav class="top-bar-nav" aria-label="Pages">
          <a class="nav-link active" href="index.html">Player</a>
          <a class="nav-link" href="card-generator.html">Generator</a>
        </nav>
      </div>
      <div class="top-bar-right">
        <div id="auth-widget" class="auth-widget"></div>
        <button id="theme-toggle" class="theme-toggle icon-btn" aria-label="Toggle theme">☀</button>
      </div>
    </div>

    <!-- Main player layout -->
    <main class="app-layout">

      <p id="status-message">Scan a QR code to load a track</p>

      <!-- Mystery album art card -->
      <div class="mystery-card-wrap">
        <div class="mystery-card" id="mystery-card">
          <div class="card-ring"></div>
          <div class="mystery-card-inner">
            <div class="mystery-q">?</div>
            <div class="mystery-sublabel">Mystery Track</div>
          </div>
        </div>
      </div>

      <!-- Track ID (shown after scan, set by player.js) -->
      <div id="mystery-id"></div>

      <!-- Player wrapper (shown by player.js when track loads) -->
      <div id="player-wrapper">
        <div class="player-bar">
          <span class="mystery-text">??? ??? ???</span>
        </div>
      </div>

      <!-- Progress bar (always shown, driven by timeupdate) -->
      <div class="progress-section">
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Play / Pause button -->
      <button id="play-button">
        <div class="play-icon"></div>
      </button>

      <!-- Scan QR code button -->
      <button id="scan-button">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="5" height="5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="12" y="1" width="5" height="5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1" y="12" width="5" height="5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="3" width="1.5" height="1.5" fill="currentColor"/>
          <rect x="14" y="3" width="1.5" height="1.5" fill="currentColor"/>
          <rect x="3" y="14" width="1.5" height="1.5" fill="currentColor"/>
          <path d="M12 12h2v2h-2zM14 12h3M12 14v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
        </svg>
        Scan QR Code
      </button>

      <!-- Loading state -->
      <div id="loading-section" style="display: none">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>

    </main>

    <!-- Fixed footer -->
    <footer>
      <span>MyHitster</span>
      <span class="footer-sep">|</span>
      <span>Mystery Music</span>
    </footer>

    <!-- Auth modal -->
    <div id="auth-modal" class="auth-modal-overlay" style="display:none">
      <div class="auth-modal-box" role="dialog" aria-modal="true" aria-label="Sign in to MyHitster">
        <button class="auth-modal-close" id="auth-modal-close" aria-label="Close">&times;</button>

        <div class="auth-modal-brand">
          <div class="auth-modal-brand-icon">H</div>
          <span class="auth-modal-brand-name">MyHitster</span>
        </div>

        <div class="auth-modal-body">
          <div class="auth-tabs" role="tablist">
            <button class="auth-tab active" data-tab="signin" role="tab" aria-selected="true">Sign in</button>
            <button class="auth-tab" data-tab="signup" role="tab" aria-selected="false">Sign up</button>
          </div>

          <div class="auth-panel" id="auth-panel-signin">
            <button class="auth-google-btn" id="auth-google-signin">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" style="flex-shrink:0">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continue with Google
            </button>
            <div class="auth-or"><span>or</span></div>
            <input class="auth-input" type="email" id="auth-email-signin" placeholder="Email" autocomplete="email" />
            <input class="auth-input" type="password" id="auth-pass-signin" placeholder="Password" autocomplete="current-password" />
            <p class="auth-msg" id="auth-msg-signin"></p>
            <button class="auth-submit" id="auth-submit-signin">Sign in</button>
          </div>

          <div class="auth-panel hidden" id="auth-panel-signup">
            <button class="auth-google-btn" id="auth-google-signup">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" style="flex-shrink:0">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Continue with Google
            </button>
            <div class="auth-or"><span>or</span></div>
            <input class="auth-input" type="email" id="auth-email-signup" placeholder="Email" autocomplete="email" />
            <input class="auth-input" type="password" id="auth-pass-signup" placeholder="Password (min 6 chars)" autocomplete="new-password" />
            <p class="auth-msg" id="auth-msg-signup"></p>
            <button class="auth-submit" id="auth-submit-signup">Create account</button>
          </div>
        </div>
      </div>
    </div>

    <!-- QR Scanner overlay — all IDs preserved for scanner.js -->
    <div id="scanner-container">
      <p id="scanner-status">Position QR code in the frame</p>
      <div id="video-container">
        <video id="qr-video" playsinline></video>
        <div id="scan-overlay"></div>
        <span class="scanner-corner scanner-corner-tl"></span>
        <span class="scanner-corner scanner-corner-tr"></span>
        <span class="scanner-corner scanner-corner-bl"></span>
        <span class="scanner-corner scanner-corner-br"></span>
        <div class="scanner-sweep"></div>
        <div id="scan-found-overlay"><span class="found-text">&#10003; Found</span></div>
      </div>
      <button id="close-scanner">Cancel</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/ui/particles.js"></script>
    <script src="js/ui/theme.js"></script>
    <script type="module" src="js/backend/auth.js"></script>
    <script src="js/core/player.js"></script>
    <script src="js/core/scanner.js"></script>
    <script>
      window.onload = function () {
        initScanner();
        initPlayer();
        document.getElementById("play-button").addEventListener("click", handlePlayPause);
        document.getElementById("scan-button").addEventListener("click", startScanner);
        document.getElementById("close-scanner").addEventListener("click", stopScanner);

        // Wire progress bar to audio element (defined in player.js)
        audio.addEventListener("timeupdate", function () {
          var fill = document.getElementById("progress-fill");
          if (fill && audio.duration) {
            fill.style.width = (audio.currentTime / audio.duration * 100) + "%";
          }
        });
        audio.addEventListener("ended", function () {
          var fill = document.getElementById("progress-fill");
          if (fill) fill.style.width = "0%";
        });

        // Toggle mystery card playing state alongside play/pause
        var _origUpdate = updatePlayButton;
        updatePlayButton = function () {
          _origUpdate();
          var card = document.getElementById("mystery-card");
          if (card) card.classList.toggle("playing", isPlaying);
        };
      };
    </script>
  </body>
</html>
